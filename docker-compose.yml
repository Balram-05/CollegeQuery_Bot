version: '3.8'

services:
  db:
    image: mysql:8.0
    container_name: mysql_database_container
    restart: always
    environment:
      MYSQL_ROOT_PASSWORD: your_mysql_root_password_here
      MYSQL_DATABASE: college_assistant_db
    ports:
      - "3306:3306"
    volumes:
      - mysql_data_volume:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: .
      dockerfile: Dockerfile.backend
    container_name: fastapi_backend_container
    restart: always
    environment:
      - GROQ_API_KEY=YOUR_GROQ_API_KEY_HERE
      - DB_HOST=db
      - DB_PORT=3306
      - DB_USER=root
      - DB_PASSWORD=new_password9214
      - DB_NAME=college_assistant_db
    ports:
      - "8000:8000"
    volumes:
      - ./student_db:/app/student_db
      - ./data:/app/data
    depends_on:
      db:
        condition: service_healthy

  frontend:
    build:
      context: .
      dockerfile: Dockerfile.frontend
    container_name: streamlit_frontend_container
    restart: always
    ports:
      - "8501:8501"
    environment:
      - BACKEND_URL=http://backend:8000
    depends_on:
      - backend

volumes:
  mysql_data_volume:
